name: Daily Study Content Generator

on:
  schedule:
    # 매일 아침 7시 (KST) = 전날 22시 (UTC)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feed content via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-feed.js

      - name: Commit and push
        run: |
          git config user.name "study-hub-bot"
          git config user.email "bot@study-hub.local"
          git add data/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: daily feed update $(date +%Y-%m-%d)"
            git push
          fi
