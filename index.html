<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c10">
<title>Study Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;background:#0c0c10;color:#f0eff4;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
h1{font-size:28px;font-weight:800;margin-bottom:6px}
.sub{font-size:14px;color:#6b6a76;margin-bottom:32px}
.cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:400px}
a{text-decoration:none}
.card{padding:24px;border-radius:16px;background:#16161c;border:1px solid #1e1e26;display:flex;align-items:center;gap:16px;transition:all .15s}
.card:active{transform:scale(.97);opacity:.85}
.icon{font-size:32px;width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.title{font-size:16px;font-weight:700;margin-bottom:4px}
.desc{font-size:12px;color:#6b6a76;line-height:1.5}
.sync{margin-top:28px;padding:12px 20px;border-radius:12px;background:#16161c;border:1px solid #1e1e26;font-size:12px;color:#6b6a76;text-align:center;width:100%;max-width:400px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dday{font-size:13px;color:#6b6a76;margin-top:24px}
.dday span{font-weight:700;color:#f87171;font-size:18px}
</style>
</head>
<body>
<h1>Study Hub</h1>
<p class="sub">중간고사 올인 모드</p>
<div class="cards">
  <a href="study.html"><div class="card"><div class="icon" style="background:rgba(124,106,239,.12)">📚</div><div><div class="title" style="color:#7c6aef">StudyFlow</div><div class="desc">개념 학습 → 문제 풀기 → 오답 관리</div></div></div></a>
  <a href="memory.html"><div class="card"><div class="icon" style="background:rgba(45,212,191,.12)">🧠</div><div><div class="title" style="color:#2dd4bf">MemoryFlow</div><div class="desc">공식 · 단어 · 개념 간격반복 암기</div></div></div></a>
</div>
<div class="sync" id="sync"><span class="dot" style="background:#f5a623"></span>동기화 확인 중...</div>
<div class="dday">중간고사 <span id="dd"></span></div>

<!-- 시험 범위 설정 -->
<div style="width:100%;max-width:400px;margin-top:16px">
  <button onclick="toggleRangePanel()" style="width:100%;padding:12px 16px;border-radius:12px;background:#16161c;border:1px solid #1e1e26;font-size:12px;color:#6b6a76;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:inherit">
    <span>📋 시험 범위 설정</span>
    <span id="rangeChev" style="transition:transform .25s;display:inline-block">▼</span>
  </button>
  <div id="rangePanel" style="display:none;margin-top:8px;flex-direction:column;gap:8px">
    <div style="padding:16px;border-radius:14px;background:#16161c;border:1px solid #1e1e26">
      <div style="font-size:13px;font-weight:700;color:#7c6aef;margin-bottom:10px">∫ 미적분</div>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">단원 목록 (줄바꿈으로 구분)</div>
      <textarea id="ru-calculus" rows="3" placeholder="예) 미분계수와 도함수&#10;접선의 방정식&#10;합성함수 미분" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit;resize:vertical;margin-bottom:8px"></textarea>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">메모</div>
      <input id="rn-calculus" type="text" placeholder="예) 1~3단원" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit">
    </div>
    <div style="padding:16px;border-radius:14px;background:#16161c;border:1px solid #1e1e26">
      <div style="font-size:13px;font-weight:700;color:#3b9eff;margin-bottom:10px">EN 영어</div>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">단원 목록 (줄바꿈으로 구분)</div>
      <textarea id="ru-english" rows="3" placeholder="예) 수특 1강&#10;수특 2강&#10;수특 3강" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit;resize:vertical;margin-bottom:8px"></textarea>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">메모</div>
      <input id="rn-english" type="text" placeholder="예) 수특 1~10강" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit">
    </div>
    <div style="padding:16px;border-radius:14px;background:#16161c;border:1px solid #1e1e26">
      <div style="font-size:13px;font-weight:700;color:#f5a623;margin-bottom:10px">글 화법과 작문</div>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">단원 목록 (줄바꿈으로 구분)</div>
      <textarea id="ru-korean" rows="3" placeholder="예) 화법 이론&#10;작문 이론&#10;비문학 독해" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit;resize:vertical;margin-bottom:8px"></textarea>
      <div style="font-size:11px;color:#6b6a76;margin-bottom:4px">메모</div>
      <input id="rn-korean" type="text" placeholder="예) 전 범위" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid #1e1e26;background:#0c0c10;color:#f0eff4;font-size:12px;font-family:inherit">
    </div>
    <button onclick="saveRanges()" style="padding:12px;border-radius:10px;background:rgba(124,106,239,.15);color:#7c6aef;font-size:13px;font-weight:700;width:100%;font-family:inherit;cursor:pointer;border:none">저장</button>
    <div id="rangeSaveMsg" style="font-size:12px;text-align:center;color:#6b6a76;min-height:18px"></div>
  </div>
</div>

<script>
document.getElementById("dd").textContent=`D-${Math.max(0,Math.ceil((new Date("2026-04-24")-new Date())/864e5))}`;

const FEED="https://raw.githubusercontent.com/idongdong410-maker/study-hub/main/data/feed.json";
async function sync(){
  const el=document.getElementById("sync");
  try{
    const r=await fetch(FEED+"?t="+Date.now());
    if(!r.ok)throw 0;
    const d=await r.json();
    let nQ=0,nC=0;
    if(d.questions?.length){
      const b=JSON.parse(localStorage.getItem("sf-bank")||"[]");
      const ids=new Set(b.map(q=>q.id));
      const nw=d.questions.filter(q=>!ids.has(q.id)).map((q,i)=>({...q,id:q.id||`a-${Date.now()}-${i}`,subject:q.subject||"calculus",topic:q.topic||"",difficulty:q.difficulty||"중",solved:false,correct:null}));
      if(nw.length){b.push(...nw);localStorage.setItem("sf-bank",JSON.stringify(b));nQ=nw.length}
    }
    if(d.cards?.length){
      const c=JSON.parse(localStorage.getItem("mf-cards")||"[]");
      const ids=new Set(c.map(x=>x.id));
      const nw=d.cards.filter(x=>!ids.has(x.id)).map((x,i)=>({...x,id:x.id||`ac-${Date.now()}-${i}`,dk:x.deck||x.dk||"calc",lv:0,lr:null,rv:0}));
      if(nw.length){c.push(...nw);localStorage.setItem("mf-cards",JSON.stringify(c));nC=nw.length}
    }
    let nConcept=0;
    if(d.concepts?.length){
      const existing=JSON.parse(localStorage.getItem("hub-concepts")||"[]");
      const ids=new Set(existing.map(c=>c.id));
      const nw=d.concepts.filter(c=>!ids.has(c.id));
      if(nw.length){existing.push(...nw);localStorage.setItem("hub-concepts",JSON.stringify(existing));nConcept=nw.length}
    }
    if(nQ||nC||nConcept){el.innerHTML=`<span class="dot" style="background:#34d399"></span>새 데이터: 문제 ${nQ}개, 카드 ${nC}개, 개념 ${nConcept}개 동기화 완료!`;el.style.color="#34d399"}
    else{el.innerHTML=`<span class="dot" style="background:#34d399"></span>최신 상태`;el.style.color="#6b6a76"}
  }catch(e){el.innerHTML=`<span class="dot" style="background:#6b6a76"></span>오프라인 모드 · 수동 import 가능`}
}
sync();

// ===== 시험 범위 설정 =====
const RANGE_KEY="hub-exam-ranges";
function initRangePanel(){
  const data=JSON.parse(localStorage.getItem(RANGE_KEY)||"null")||{calculus:{units:[],note:""},english:{units:[],note:""},korean:{units:[],note:""}};
  ["calculus","english","korean"].forEach(s=>{
    document.getElementById("ru-"+s).value=(data[s].units||[]).join("\n");
    document.getElementById("rn-"+s).value=data[s].note||"";
  });
}
let rangeOpen=false;
function toggleRangePanel(){
  const p=document.getElementById("rangePanel");
  const c=document.getElementById("rangeChev");
  rangeOpen=!rangeOpen;
  p.style.display=rangeOpen?"flex":"none";
  c.style.transform=rangeOpen?"rotate(180deg)":"";
  if(rangeOpen)initRangePanel();
}
function saveRanges(){
  const data={};
  ["calculus","english","korean"].forEach(s=>{
    data[s]={
      units:document.getElementById("ru-"+s).value.split("\n").map(x=>x.trim()).filter(Boolean),
      note:document.getElementById("rn-"+s).value.trim()
    };
  });
  localStorage.setItem(RANGE_KEY,JSON.stringify(data));
  const m=document.getElementById("rangeSaveMsg");
  m.textContent="저장 완료!";m.style.color="#34d399";
  setTimeout(()=>m.textContent="",2000);
}
</script>
</body>
</html>
