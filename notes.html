<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="노트">
<meta name="theme-color" content="#0f0f12">
<title>노트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f12;--bg2:#16161c;--bg3:#1e1e26;--bg4:#2a2a35;--t1:#f0eff4;--t2:#c4c3cc;--t3:#6b6a76;--purple:#7c6aef;--blue:#3b9eff;--amber:#f5a623;--teal:#2dd4bf;--radius:16px;--radius-sm:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;padding-bottom:40px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bg3);position:sticky;top:0;background:var(--bg);z-index:10}
.hdr-title{font-size:18px;font-weight:800;letter-spacing:-.5px}
.hdr-right{font-size:13px;color:var(--t3)}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px}
/* Subject tabs */
.subj-tabs{display:flex;gap:8px;margin-bottom:20px}
.subj-tab{flex:1;padding:10px 4px;border-radius:var(--radius-sm);border:1px solid var(--bg3);background:var(--bg2);font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;text-align:center;transition:all .15s}
.subj-tab.active{color:#fff;border-color:transparent}
/* Topic list */
.topic-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.topic-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.topic-name{font-size:14px;font-weight:700;color:var(--t1)}
.topic-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-auto{background:rgba(124,106,239,.15);color:var(--purple)}
.badge-user{background:rgba(45,212,191,.15);color:var(--teal)}
.badge-empty{background:var(--bg3);color:var(--t3)}
/* Concept view */
.concept-view{font-size:13px;line-height:1.8;color:var(--t2);max-height:300px;overflow-y:auto;margin-bottom:12px}
.concept-view h2{font-size:13px;font-weight:700;color:var(--t1);margin:12px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--bg3)}
.concept-view h2:first-child{margin-top:0}
.concept-view p{margin-bottom:6px}
.concept-view ul{padding-left:16px;margin-bottom:6px}
.concept-view li{margin-bottom:2px}
.concept-view code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}
.concept-view strong{color:var(--t1)}
.empty-hint{font-size:12px;color:var(--t3);padding:12px 0;margin-bottom:12px}
/* Edit area */
textarea{width:100%;min-height:180px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--bg4);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.7;resize:vertical;font-family:inherit;margin-bottom:10px}
textarea:focus{outline:none;border-color:var(--purple)}
/* Buttons */
.btn-row{display:flex;gap:8px}
.btn{padding:9px 16px;border-radius:10px;border:1px solid var(--bg4);background:var(--bg3);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--purple);border-color:var(--purple);color:#fff;flex:1}
.btn-sm{padding:6px 12px;font-size:12px}
.status-ok{font-size:12px;color:var(--teal);margin-top:6px}
.hidden{display:none}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="hdr">
  <button style="background:none;color:var(--t1);font-size:18px;font-weight:800;letter-spacing:-.5px;padding:0;font-family:inherit" onclick="window.location.href='index.html'">📝 노트</button>
  <div class="hdr-right" id="hdrRight"></div>
</div>
<div class="wrap">
  <div class="subj-tabs" id="subjTabs"></div>
  <div id="topicList"></div>
</div>

<script>

      {id:"emotion",name:"심경 변화 파악",icon:"😊"},

    ]}

// ===== STATE =====
let S={subject:"calculus"};

// ===== HELPERS =====
function getExamUnits(subj){
  const r=JSON.parse(localStorage.getItem("hub-exam-ranges")||"null");
  if(r&&r[subj]&&(r[subj].units||[]).length)return r[subj].units;
  const p=JSON.parse(localStorage.getItem("hub-progress")||"null");
  return p?.examRanges?.[subj]?.units||[];
}

function getTopics(subj){
  const units=getExamUnits(subj);
  const sub=SUBJECTS[subj];
  if(!units.length)return sub.topics;
  const filtered=sub.topics.filter(t=>units.includes(t.name));
  return filtered.length?filtered:sub.topics;
}

function getNote(subj,topicId){
  return localStorage.getItem(`note-${subj}-${topicId}`)||"";
}

function saveNote(subj,topicId,text){
  localStorage.setItem(`note-${subj}-${topicId}`,text);
}

const SEED_CONCEPTS=[{"id": "seed-calc-0", "subject": "calculus", "topic": "수열의 수렴과 발산", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n* 수렴: 수열 {a_n}에서 n이 한없이 커질 때 일반항 a_n의 값이 일정한 값 α에 한없이 가까워지면 수렴한다고 하며, lim(n→∞) a_n = α로 나타냅니다.\n* 발산: 양의 무한대, 음의 무한대, 혹은 진동(교대 부호 등)하는 경우입니다.\n* 극한의 대소 관계 (샌드위치 정리): 모든 자연수 n에 대하여 a_n ≤ c_n ≤ b_n이고 lim(n→∞) a_n = lim(n→∞) b_n = α이면, lim(n→∞) c_n = α가 성립합니다.\n\n## 풀이 포인트\n부호가 교대로 바뀌는 진동수열을 반례로 찾는 참/거짓 판단 문제가 자주 출제됩니다."}, {"id": "seed-calc-1", "subject": "calculus", "topic": "극한값의 계산", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n* ∞/∞ 꼴: 분모의 최고차항으로 나누어 계산. 분모와 분자의 차수가 같으면 최고차항 계수의 비로 수렴.\n* ∞-∞ 꼴: 무리식이 있고 차수와 최고차항 계수가 같을 때 분모·분자를 유리화.\n\n## 풀이 포인트\n√(2차식) - √(2차식) 형태는 완전제곱꼴로 바꾸어 상수항을 무시하는 근사 다항식을 쓰면 계산이 매우 빨라집니다."}, {"id": "seed-calc-2", "subject": "calculus", "topic": "등비급수의 극한", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n* 수렴 조건: 등비급수는 첫째항 a=0 이거나 공비 r이 -1 < r < 1 (|r|<1) 일 때 수렴합니다. (r=1일 때는 발산하므로 주의!)\n\n## 풀이 포인트\n도형(프랙탈)과 결합된 수능 빈출 문제에서는 첫 번째 도형의 성질(a)과 다음 도형과의 길이비(닮음비)를 찾아 넓이비(공비 r)를 구하는 것이 핵심입니다. 개수가 늘어나면 공비 r = (넓이비) × (개수 증가비) 입니다."}, {"id": "seed-calc-3", "subject": "calculus", "topic": "수열의 극한의 대소 관계", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\nan ≤ bn 일 때, 양변에 극한을 취하면 lim an ≤ lim bn 이 성립합니다.\n중요한 점은 부등호에 등호가 없었더라도 극한에서는 등호가 포함되어 수렴값이 같아질 수 있다는 점입니다.\n\n## 합답형 문제 주의사항\n합답형 문제에서는 직관식 접근보다 반례를 적극적으로 찾아내는 것이 필수입니다."}, {"id": "seed-calc-4", "subject": "calculus", "topic": "샌드위치 정리", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\nan ≤ cn ≤ bn 이고 lim an = lim bn = L 이면 lim cn = L 이다.\n\n## 풀이 포인트\n수열 혹은 함수의 대소 관계가 주어졌을 때, 양끝단의 극한을 구하여 중간값의 수렴을 증명할 때 사용합니다. 부등식 형태의 주어진 조건에 lim를 씌워 양끝값이 동일해지는지 우선 확인하세요."}, {"id": "seed-calc-5", "subject": "calculus", "topic": "급수의 수렴과 발산", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n무한급수 Σa_n에서 n항까지의 부분합 Sn의 극한인 lim(n→∞) Sn 이 일정한 값 S에 수렴하면, 급수가 S로 수렴한다고 합니다.\n\n## 급수와 일반항의 관계\n급수 Σa_n가 수렴하면 무조건 lim(n→∞) a_n = 0 이지만, 역은 성립하지 않습니다 (조화급수 등)."}, {"id": "seed-calc-6", "subject": "calculus", "topic": "등비급수", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n등비수열 {ar^(n-1)}의 무한급수. |r|<1일 때 수렴하며 값은 S = a/(1-r) 입니다.\n\n## 풀이 포인트\n급수 파트에서 가장 중요한 공식입니다 S = a/(1-r). 1-r 분의 a를 이용해 무한히 반복되는 프랙탈 도형의 넓이를 구하게 됩니다."}, {"id": "seed-calc-7", "subject": "calculus", "topic": "급수의 성질", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\nΣa_n, Σb_n 이 수렴할 때만 분배 법칙이 성립합니다.\nΣ(a_n ± b_n) = Σa_n ± Σb_n\nΣ(c*a_n) = c*Σa_n\n\n## 주의\n수열과 마찬가지로 급수가 발산하는 경우 분배할 수 없으므로, 어떤 수열이 수렴한다고 정의되어 있는지 반드시 확인해야 합니다."}, {"id": "seed-calc-8", "subject": "calculus", "topic": "급수와 부분합의 관계", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n부분합 S_n이 주어졌을 때 일반항 a_n = S_n - S_n-1 (n≥2) 을 통해 a_n을 찾고, 그 극한을 구하는 것이 기본 논리입니다.\n\n## 풀이 포인트\nΣa_n = S 이면 lim a_n = 0 이다. 이 점을 이용해 lim a_n 에 미지수가 포함되어 있을 경우, 미지수 값을 즉시 확정짓는 데 자주 사용됩니다."}, {"id": "seed-calc-9", "subject": "calculus", "topic": "여러 가지 급수의 합", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\n부분분수 분해: 1/AB = (1/(B-A))(1/A - 1/B)\n\n## 풀이 포인트\n식을 나열해 이웃하는 항 혹은 한 칸 건너뛴 항들을 서로 소거하는 텔레스코핑 급수가 핵심입니다."}, {"id": "seed-calc-10", "subject": "calculus", "topic": "지수함수의 미분", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\n* (e^x)' = e^x\n* (a^x)' = a^x · ln a\n\n## 합성함수 결합\n{e^f(x)}' = f'(x)e^f(x)"}, {"id": "seed-calc-11", "subject": "calculus", "topic": "로그함수의 미분", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\n* (ln x)' = 1/x\n* (log_a x)' = 1 / (x ln a)\n\n## 합성함수 결합\n{ln f(x)}' = f'(x)/f(x)"}, {"id": "seed-calc-12", "subject": "calculus", "topic": "삼각함수의 미분", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\n* (sin x)' = cos x\n* (cos x)' = -sin x\n* (tan x)' = sec²x\n\n## 풀이 포인트\nc로 시작하는 삼각함수(cos, csc, cot)를 미분하면 마이너스(-) 부호가 붙습니다."}, {"id": "seed-calc-13", "subject": "calculus", "topic": "삼각함수의 극한", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\n* lim(x→0) (sin x)/x = 1\n* lim(x→0) (tan x)/x = 1\n\n## 도형 응용 포인트\n수능 단골 출제! 근사(sin x ≒ x, 1-cos x ≒ x²/2)를 사용하면 매우 빠릅니다."}, {"id": "seed-calc-14", "subject": "calculus", "topic": "자연로그의 밑 e", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\nlim(x→0) (1+x)^(1/x) = e\nlim(x→∞) (1+1/x)^x = e\n\n## 풀이 포인트\n괄호 안의 x와 서로 완벽한 역수 관계가 되게끔 지수 식을 조작해야 합니다."}, {"id": "seed-calc-15", "subject": "calculus", "topic": "합성함수의 미분법", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\ny = f(g(x)) 일 때 y' = f'(g(x)) * g'(x)\n\n## 풀이 포인트\n겉미분을 한 뒤 반드시 속미분을 곱해줍니다."}, {"id": "seed-calc-16", "subject": "calculus", "topic": "매개변수로 나타낸 함수의 미분법", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\nx=f(t), y=g(t) 일 때\ndy/dx = (dy/dt) / (dx/dt) = g'(t) / f'(t)"}, {"id": "seed-calc-17", "subject": "calculus", "topic": "음함수의 미분법", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 개념\nf(x,y)=0 형태에서 y를 x 함수로 취급해 양변을 미분.\n\n## 풀이 포인트\ny를 미분할 때는 일반 미분 후 반드시 (dy/dx)를 곱합니다."}, {"id": "seed-calc-18", "subject": "calculus", "topic": "역함수의 미분법", "date": "2026-04-05T00:00:00Z", "content": "## 핵심 공식\n역함수 g(x)에 대해 g'(b) = 1 / f'(a)\n\n## 풀이 포인트\n역함수를 직접 구하지 않고, 원래 함수의 기울기 역수를 취합니다."}, {"id": "seed-eng-0", "subject": "english", "topic": "글의 목적 파악", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 1강 요약\n이 단원의 대표 지문들은 화자가 특정 독자에게 감정, 규칙, 변경사항 등을 전달하기 위해 작성된 '실용문/서한' 형태가 다수입니다.\n\n- **핵심 포인트**: 전반부에서는 배경 지식을, 후반부 'I am writing to~', 'would appreciate it if~' 등의 표현에 집중하세요.\n- **주요 어휘**: appreciate, inform, require, policy"}, {"id": "seed-eng-1", "subject": "english", "topic": "심경 변화 파악", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 2강 요약\n주인공이 특정한 사건이나 계기를 겪으며 감정선이 어떻게 변하는지에 초점을 맞춘 내러티브 형태입니다.\n\n- **핵심 포인트**: 전반부 감정 형용사와 후반부 감정 형용사를 빠르게 매칭합니다.\n- **주요 어휘**: anxious -> relieved (초조한->안도하는), disappointed -> delighted (실망한->기쁜)"}, {"id": "seed-eng-2", "subject": "english", "topic": "함축적 의미 파악", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 3강 요약\n밑줄 친 비유적 표현이나 속담이 지문의 맥락 안에서 지니는 '진짜 의미'를 추론하는 고난도 유형입니다.\n\n- **핵심 포인트**: 밑줄 친 문장 자체의 직역이 아니라, **필자의 주장(요지)**을 찾아 거기에 비유된 대상에 대입해야 합니다.\n- **주요 어휘**: metaphorical(은유적인), contextual(문맥상의)"}, {"id": "seed-eng-3", "subject": "english", "topic": "요지 파악", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 4강 요약\n필자의 강한 주장이나 견해를 파악해야 하며 주로 명령문이나 당위성 표현 뒤에 요지가 등장합니다.\n\n- **핵심 포인트**: 'must', 'should', 'need to', 'important to'가 포함된 문장이 핵심 필살기 문장입니다."}, {"id": "seed-eng-4", "subject": "english", "topic": "철학·역사 지문", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 21강 요약\n추상적인 개념, 역사적 사건 속의 패턴, 또는 철학 사상을 다루는 최상위 고난도 지문입니다.\n\n- **핵심 포인트**: 단어가 추상적이므로, 첫 문장의 개념을 자신만의 쉬운 언어로 바꾸어(재진술) 읽어내려가는 것이 필수입니다.\n- **주요 어휘**: paradigm(패러다임), absolute(절대적인), subsequent(그다음의)"}, {"id": "seed-eng-5", "subject": "english", "topic": "환경·자원 지문", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 22강 요약\n지속 가능한 발전(Sustainability), 기후 변화, 혹은 소프트 패스 공학 등 최신 환경 이슈를 다룹니다.\n\n- **출제 포인트**: 전통적 개발(부정적) vs 새로운 대안(긍정적)의 이분법적 논리 구조가 가장 많이 쓰입니다.\n- **주요 어휘**: interventionist(개입주의적인), variability(변동성), ecological(생태학의)"}, {"id": "seed-eng-6", "subject": "english", "topic": "과학 지문", "date": "2026-04-05T00:00:00Z", "content": "## ✅ EBS 수능특강 23강 요약\n인공지능(AI), 뇌과학, 물리적 현상의 발견 등을 실험적 결과와 함께 전달하는 지문입니다.\n\n- **출제 포인트**: '연구자들은 다음과 같은 사실을 발견했다(found that)' 뒤의 결과가 곧 지문의 주제(Topic)입니다."}, {"id": "seed-kor-0", "subject": "korean", "topic": "화법 이론", "date": "2026-04-05T00:00:00Z", "content": "## ✅ [수능 화법 핵심 요약]\n**1. 나 전달법 (I-message)**\n상대방을 비난하지 않고, '나'의 감정과 기대를 중심으로 솔직하게 느낌을 표현하는 대화법입니다. 갈등 완화에 필수적입니다.\n\n**2. 공감적 듣기**\n소극적 공감(눈맞춤, 끄덕임)과 적극적 공감(요약하기, 반영하기)을 통해 화자와의 신뢰를 형성합니다.\n\n* **출제 포인트**: 상황극이나 토론 속에서 참여자의 '말하기 방식' 특징을 객관식으로 고르는 문제가 반드시 출제됩니다."}, {"id": "seed-kor-1", "subject": "korean", "topic": "작문 이론", "date": "2026-04-05T00:00:00Z", "content": "## ✅ [수능 작문 요약]\n**1. 작문 맥락과 계획**\n초고를 작성하기 전에 예상 독자(나이, 수준)와 글의 목적(설득, 정보전달, 친교)을 설정해야 합니다.\n\n**2. 자료 활용 방안**\n통계 기사나 전문가의 인용구 등 수집된 추가 자료를 초고의 어느 단락(입론, 결론 등)에 시각적으로 편입할지 묻는 것이 고정 출제 유형입니다.\n\n* **출제 포인트**: 수정 전/후의 글을 보여주고 어느 부분이 '고쳐쓰기 원칙(통일성, 일관성)'에 어긋났는지 찾아내는 문항 대비 필수!"}, {"id": "seed-kor-2", "subject": "korean", "topic": "3모 비문학", "date": "2026-04-05T00:00:00Z", "content": "## ✅ [3월 모의고사 비문학 기출 요약]\n정보량이 폭발적으로 늘어나는 과학/기술 및 인문/철학 복합 지문입니다.\n\n* **핵심 강령 (비문학 돌파)**\n1. 문단별 소주제를 한 줄로 요약하며 넘어갑니다.\n2. 대비되는 두 입장 혹은 두 개념 (예: 하드패스 vs 소프트패스)은 표처럼 정리하며 읽습니다.\n3. 특정 기술의 '과정(Process)'이나 '순서'는 지문에 동그라미 번호를 매겨 시각화해야 추론 문제를 풀 때 시간이 단축됩니다."}];

function getAutoConcept(subj,topicName){
  const all=SEED_CONCEPTS.concat(JSON.parse(localStorage.getItem("hub-concepts")||"[]"));
  return all.filter(c=>c.subject===subj&&c.topic===topicName).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}

function renderMd(text){
  if(!text)return"";
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/^\d+\. (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>[^]*?<\/li>\n?)+/g,m=>"<ul>"+m+"</ul>")
    .split(/\n{2,}/)
    .map(chunk=>chunk.trim().startsWith("<")?chunk:`<p>${chunk.replace(/\n/g," ")}</p>`)
    .join("\n");
}

function render(){
  // D-day
  const _td=new Date();_td.setHours(0,0,0,0);
  const dd=Math.round((new Date("2026-04-23")-_td)/864e5);
  document.getElementById("hdrRight").textContent=`D-${dd>0?dd:0}`;

  // Subject tabs
  document.getElementById("subjTabs").innerHTML=Object.entries(SUBJECTS).map(([k,v])=>{
    const active=S.subject===k;
    return`<button class="subj-tab${active?" active":""}" style="${active?`background:${v.color};color:#fff`:""}" onclick="S.subject='${k}';render()">${v.emoji} ${v.name}</button>`;
  }).join("");

  // Topic list
  const sub=SUBJECTS[S.subject];
  const topics=getTopics(S.subject);
  document.getElementById("topicList").innerHTML=`<div class="fade-in">${topics.map(t=>renderTopicCard(t,sub)).join("")}</div>`;
}

function renderTopicCard(t,sub){
  const userNote=getNote(S.subject,t.id);
  const autoConcept=getAutoConcept(S.subject,t.name);
  const content=userNote||(autoConcept?.content||"");
  const hasUser=!!userNote;
  const hasAuto=!!autoConcept&&!userNote;
  const isEmpty=!content;

  const badge=hasUser
    ?`<span class="topic-badge badge-user">내 노트</span>`
    :hasAuto
    ?`<span class="topic-badge badge-auto">🤖 자동</span>`
    :`<span class="topic-badge badge-empty">미작성</span>`;

  const viewId=`view-${S.subject}-${t.id}`;
  const editId=`edit-${S.subject}-${t.id}`;
  const taId=`ta-${S.subject}-${t.id}`;
  const stId=`st-${S.subject}-${t.id}`;
  const btnId=`btn-${S.subject}-${t.id}`;

  const viewHtml=isEmpty
    ?`<div class="empty-hint" id="${viewId}">/generate-study 실행 후 자동 표시됩니다.<br>직접 입력도 가능합니다.</div>`
    :`<div class="concept-view" id="${viewId}">${renderMd(content)}</div>`;

  const safeContent=content.replace(/\\/g,"\\\\").replace(/`/g,"\\`");

  return`<div class="topic-card">
    <div class="topic-header">
      <span class="topic-name">${t.icon} ${t.name}</span>
      ${badge}
    </div>
    ${viewHtml}
    <div class="hidden" id="${editId}">
      <textarea id="${taId}" placeholder="개념 요약을 입력하세요...&#10;&#10;예) ## 핵심 개념&#10;내용...">${content.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-sm" id="${btnId}" onclick="toggleEdit('${S.subject}','${t.id}','${viewId}','${editId}','${taId}','${btnId}')">편집</button>
    </div>
    <div id="${stId}"></div>
  </div>`;
}

function toggleEdit(subj,topicId,viewId,editId,taId,btnId){
  const view=document.getElementById(viewId);
  const edit=document.getElementById(editId);
  const btn=document.getElementById(btnId);
  const st=document.getElementById(`st-${subj}-${topicId}`);

  if(edit.classList.contains("hidden")){
    // 편집 모드로 전환
    edit.classList.remove("hidden");
    view.classList.add("hidden");
    btn.textContent="저장";
  }else{
    // 저장 후 읽기 모드로 복귀
    const txt=document.getElementById(taId).value;
    saveNote(subj,topicId,txt);
    edit.classList.add("hidden");
    view.classList.remove("hidden");
    view.className=txt?"concept-view":"empty-hint";
    view.innerHTML=txt?renderMd(txt):"/generate-study 실행 후 자동 표시됩니다.<br>직접 입력도 가능합니다.";
    btn.textContent="편집";
    st.innerHTML=`<div class="status-ok">저장됨 ✓</div>`;
    setTimeout(()=>{if(st)st.innerHTML=""},2000);
  }
}

render();
</script>
</body>
</html>
